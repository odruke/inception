services:
  mariadb:
    build: ./requirements/mariadb
    container_name: mariadb
    volumes:
      - mariadbvol:/var/lib/mysql/
    restart: always
    expose:
      - "3306"
    env_file:
      - .env
    networks:
      - inception_network

  wordpress:
    build: ./requirements/wordpress
    container_name: wordpress
    depends_on:
      - mariadb
    volumes:
      - wordpressvol:/var/www/html/
    restart: always
    expose:
      - "9000"
    env_file:
      - .env
    networks:
      - inception_network

  nginx:
    build: ./requirements/nginx
    container_name: nginx
    depends_on:
      - wordpress
    ports:
      - "443:443"
    volumes:
      - wordpressvol:/var/www/html:ro
    restart: always
    env_file:
      - .env
    networks:
      - inception_network

volumes:
  mariadbvol:
    driver: local
    driver_opts:
      device: /home/odruke-s/data/mariadbvol
      o: bind
      type: none

  wordpressvol:
    driver: local
    driver_opts:
      device: /home/odruke-s/data/wordpressvol
      o: bind
      type: none

networks:
  inception_network:
    name: inception-network
    driver: bridge
